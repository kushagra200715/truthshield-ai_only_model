<!DOCTYPE html>
<html>
<head>
  <title>Website Scanner</title>

  <!-- ✅ FIXED -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav">
    <div class="logo">🛡 TruthShieldAI</div>

    <div class="links">
      <a href="/dashboard">Dashboard</a>
      <a href="/">Home</a>
    </div>
  </div>
</nav>

<section class="page">
  <h1>🌐 Website Safety Checker</h1>

  <div class="card scanner-box">
    <!-- ✅ input id -->
    <input type="text" id="urlInput" placeholder="Enter website URL">

    <!-- ✅ onclick -->
    <button onclick="checkWebsite()" class="btn primary full">
      Check Website
    </button>
  </div>

  <div class="card result-box">
    <h3>Result</h3>

    <!-- ✅ dynamic result -->
    <p id="resultText">Risk Score: -</p>
  </div>
</section>

<script>
async function checkWebsite() {

  const url = document.getElementById("urlInput").value;

  if (!url.trim()) {
    alert("Bhai URL daal pehle 😑");
    return;
  }

  try {
    const res = await fetch("/check-website", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url: url })
    });

    const data = await res.json();

    document.getElementById("resultText").innerHTML =
      "Risk Score: " + data.risk_score + "<br>" +
      "Result: <b style='color:" + (data.result === "SCAM" ? "red" : "lightgreen") + "'>"
      + data.result + "</b>";

  } catch (err) {
    console.error(err);
    alert("Backend error aa gaya bhai 😭");
  }
}
</script>

</body>
</html>
