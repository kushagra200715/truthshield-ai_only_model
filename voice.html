<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Call Analyzer - TruthShield AI</title>

  <link rel="stylesheet" href="/static/style.css">

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    .working {
      font-size: 80px;
      margin-top: 30px;
      background: linear-gradient(90deg,#00FFFF,#0096FF);
      -webkit-background-clip: text;
      color: transparent;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .container {
      margin-top: 50px;
    }

    input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- 🔙 BACK BUTTON -->
<div class="back-btn">
  <a href="/dashboard" class="btn ghost">⬅ Back</a>
</div>
